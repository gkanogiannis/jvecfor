name: R CMD check + BiocCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }}, BioC ${{ matrix.config.bioc }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'devel',   bioc: 'devel'}
          - {os: ubuntu-latest,  r: 'release', bioc: 'release'}
          - {os: macOS-latest,   r: 'release', bioc: 'release'}
          - {os: windows-latest, r: 'release', bioc: 'release'}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build jvecfor JAR
        run: make install

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Set up Bioconductor
        uses: r-lib/actions/setup-bioc@v2
        with:
          bioc-version: ${{ matrix.config.bioc }}

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            bioc::BiocCheck
            any::rcmdcheck
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'

      - name: Run BiocCheck
        run: |
          BiocCheck::BiocCheck(
            package = ".",
            `quit-with-status` = TRUE,
            `no-check-bioc-help` = TRUE
          )
        shell: Rscript {0}
